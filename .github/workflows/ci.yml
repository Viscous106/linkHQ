name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: edustream
          POSTGRES_USER: edustream
          POSTGRES_PASSWORD: localdev
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U edustream"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://edustream:localdev@localhost:5432/edustream
      DIRECT_DATABASE_URL: postgresql+asyncpg://edustream:localdev@localhost:5432/edustream
      TEST_DATABASE_URL: postgresql+asyncpg://edustream:localdev@localhost:5432/linkhq_test
      REDIS_URL: redis://localhost:6379/0
      AUTH_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Apply migrations
        run: alembic upgrade head

      - name: Create test database
        env:
          PGPASSWORD: localdev
        run: psql -h localhost -U edustream -d edustream -c "CREATE DATABASE linkhq_test;" || true

      - name: Test (pytest)
        run: pytest

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc -b && vite build)
        run: npm run build
